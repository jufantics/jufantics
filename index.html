<!-- PDF Modal -->
<div id="pdfModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background-color:rgba(0,0,0,0.8); z-index:1000;">
    <div style="position:relative; margin: auto; width: 80%; top: 10%; background: navy; padding: 20px; border-radius: 10px;">
        <button onclick="closePDF()" style="position: absolute; top: 10px; right: 10px;">Close</button>
        <iframe id="pdfFrame" style="width: 100%; height: 70vh;" frameborder="0"></iframe>
    </div>
</div>

<script>
function openBook(pdfUrl) {
    document.getElementById('pdfFrame').src = pdfUrl;
    document.getElementById('pdfModal').style.display = 'block';
}

function closePDF() {
    document.getElementById('pdfModal').style.display = 'none';
}
</script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <!-- OPEN BOOK Section -->
    <div id="book-section">
        <h2>Open Book</h2>
        <button onclick="openBook('sample.pdf')">Open PDF</button>
    </div>

    <!-- Modal for PDF Viewer -->
    <div id="pdfModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background-color:rgba(0,0,0,0.7); z-index:1000;">
        <div style="position:relative; width:80%; height:80%; margin:auto; top:10%;">
            <span onclick="closePDF()" style="position:absolute; right:10px; top:10px; cursor:pointer; color:white;">X</span>
            <iframe id="pdfFrame" style="width:100%; height:100%;" src=""></iframe>
        </div>
    </div>

    <script>
        function openBook(pdfUrl) {
            document.getElementById('pdfFrame').src = pdfUrl;
            document.getElementById('pdfModal').style.display = 'block';
        }

        function closePDF() {
            document.getElementById('pdfModal').style.display = 'none';
            document.getElementById('pdfFrame').src = ''; // Clear the iframe src
        }
    </script>
</body>
</html>
